<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>シミュレーション開始ページ</title>
    <link rel="stylesheet" href="style.css">
    <style>
      /* 最小のセンタリング調整：既存の style.css を利用しますが、保険として短いルールを追加 */
      .pre-sim-wrapper{display:flex;align-items:center;justify-content:center;min-height:70vh}
      .pre-sim-card{max-width:640px;padding:28px;border-radius:8px;background:#fff;box-shadow:0 6px 20px rgba(0,0,0,0.06);text-align:center}
      #startSimulation{padding:10px 18px;font-size:16px}
      /* タイトルを少し大きくする */
      .pre-sim-card header h1{font-size:24px;margin:0 0 8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    </style>
  </head>
  <body>
    <div class="container pre-sim-wrapper">
      <main class="pre-sim-card">
          <header>
            <img src="top.png" alt="トップ画像" class="pre-sim-top-img">
            <h1>AlmaLinux インストール体験シミュレーター</h1>
          </header>
          <section>
            

            <h2 class="sr">学習目標</h2>
            <ul class="learning-goals">
              <li>Linux のインストールプロセスを理解する</li>
            </ul>

            <div class="info">このシミュレーションは実際のシステムに変更を加えません。</div>

            <div class="actions">
              <button id="startSimulation">シミュレーション開始</button>
            </div>
          </section>
            <footer class="pre-sim-card-footer" role="contentinfo" aria-label="フッター情報">
              <div class="pre-sim-card-footer-left">Version 1.0.0</div>
              <div class="pre-sim-card-footer-right">Builder: tksarah</div>
            </footer>
          </main>
        </div>
    <script>
      (function(){
        const startBtn = document.getElementById('startSimulation');
        if(startBtn){
          startBtn.addEventListener('click', function(){
              // シングルボタンで通常遷移 — localStorage をクリアしてから遷移
              try{ localStorage.clear(); }catch(e){}
              window.location.href = 'app-main.html';
            });

        
        }
      })();
    </script>

    <style>
      :root{
        --accent:#0b63b5;
        --muted:#6b7280;
        --card-bg:#ffffff;
        --badge-bg:#e6f2ff;
        --badge-color:#075985;
        --radius-lg:12px;
        --radius-pill:999px;
        --shadow-1:0 6px 20px rgba(11,99,181,0.08);
      }
      .pre-sim-top-img{width:90%;max-width:680px;height:auto;display:block;margin:0 auto 12px;border-radius:8px}
      .meta-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;gap:12px}
      .version{color:var(--muted);font-size:13px}
      .learning-goals{list-style:disc;padding-left:18px;text-align:left;color:#14213d;margin:8px 0}
      .info{background:#f8fafc;border-left:4px solid #60a5fa;padding:10px;border-radius:6px;color:#0f172a;margin:12px 0}
      .checklist{text-align:left;margin:12px 0}
      .checklist ul{padding-left:18px;margin:6px 0}
      .hints{background:#fff7ed;border:1px solid #fde3b8;padding:12px;border-radius:8px;margin-top:14px}
      .secondary{background:transparent;border:1px solid #e6e9f2;color:#334155;padding:10px 14px;border-radius:10px;font-size:14px;cursor:pointer}
      .actions{display:flex;gap:12px;justify-content:center;margin-top:16px;align-items:center}
      @media (min-width:900px){ .pre-sim-card{max-width:900px} }

      /* Unified control tokens */
      .pre-sim-controls{display:flex;gap:14px;align-items:center;justify-content:center;flex-wrap:wrap}
      #startSimulation{background:var(--accent);color:#fff;border:none;border-radius:var(--radius-lg);padding:12px 22px;font-size:16px;font-weight:700;box-shadow:var(--shadow-1);cursor:pointer}
      #startSimulation:hover{filter:brightness(0.98);transform:translateY(-1px)}
      /* Responsive: stack vertically on narrow screens */
      @media(max-width:520px){
        #startSimulation{width:100%}
      }

      /* Footer moved inside card: show muted left/right info (stylish italic) */
      .pre-sim-card-footer{display:flex;justify-content:space-between;align-items:center;padding-top:12px;border-top:1px solid #eef6fb;margin-top:18px;font-size:13px}
      .pre-sim-card-footer-left,.pre-sim-card-footer-right{ color:var(--muted); font-style:italic; font-weight:400; font-family: Georgia, 'Times New Roman', serif; letter-spacing:0.1px; opacity:0.95; }
      @media(max-width:520px){ .pre-sim-card-footer{flex-direction:column;gap:8px;text-align:center} }
    </style>
  </body>
</html>
